      providerDeepSeek:
        $ref: '#/definitions/mp.AppModelParamsDeepSeek'
      providerHuoshan:
        $ref: '#/definitions/mp.AppModelParamsHuoShan'
      providerInfini:
        $ref: '#/definitions/mp.AppModelParamsInfini'
      providerOllama:
