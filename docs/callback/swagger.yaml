      providerQianFan:
        $ref: '#/definitions/mp.AppModelParamsQianFan'
      providerQwen:
        $ref: '#/definitions/mp.AppModelParamsQwen'
      providerYuanjing:
        allOf:
        - $ref: '#/definitions/mp.AppModelParamsYuanjing'
        description: YuanJing模型配置
    type: object
  mp.AppModelParamsDeepSeek:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.AppModelParamsHuoShan:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.AppModelParamsInfini:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.AppModelParamsOllama:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.AppModelParamsOpenAICompatible:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.AppModelParamsQianFan:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.AppModelParamsQwen:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.AppModelParamsYuanjing:
    properties:
      llm:
        allOf:
        - $ref: '#/definitions/mp_common.LLMParams'
        description: 大语言模型配置
    type: object
  mp.ProviderModelByDeepSeek:
    properties:
      llm:
        $ref: '#/definitions/mp_deepseek.LLM'
    type: object
  mp.ProviderModelByHuoShan:
    properties:
      embedding:
        $ref: '#/definitions/mp_huoshan.Embedding'
      llm:
        $ref: '#/definitions/mp_huoshan.LLM'
    type: object
  mp.ProviderModelByInfini:
    properties:
      embedding:
        $ref: '#/definitions/mp_infini.Embedding'
      llm:
        $ref: '#/definitions/mp_infini.LLM'
      rerank:
        $ref: '#/definitions/mp_infini.Rerank'
    type: object
  mp.ProviderModelByOllama:
    properties:
      embedding:
        $ref: '#/definitions/mp_ollama.Embedding'
      llm:
        $ref: '#/definitions/mp_ollama.LLM'
    type: object
  mp.ProviderModelByOpenAICompatible:
    properties:
      embedding:
        $ref: '#/definitions/mp_openai_compatible.Embedding'
      llm:
        $ref: '#/definitions/mp_openai_compatible.LLM'
      rerank:
        $ref: '#/definitions/mp_openai_compatible.Rerank'
    type: object
  mp.ProviderModelByQianFan:
    properties:
      embedding:
        $ref: '#/definitions/mp_qianfan.Embedding'
      llm:
        $ref: '#/definitions/mp_qianfan.LLM'
      rerank:
        $ref: '#/definitions/mp_qianfan.Rerank'
    type: object
  mp.ProviderModelByQwen:
    properties:
      embedding:
        $ref: '#/definitions/mp_qwen.Embedding'
      llm:
        $ref: '#/definitions/mp_qwen.LLM'
      rerank:
        $ref: '#/definitions/mp_qwen.Rerank'
    type: object
  mp.ProviderModelByYuanjing:
    properties:
      embedding:
        $ref: '#/definitions/mp_yuanjing.Embedding'
      gui:
        $ref: '#/definitions/mp_yuanjing.Gui'
      llm:
        $ref: '#/definitions/mp_yuanjing.LLM'
      ocr:
        $ref: '#/definitions/mp_yuanjing.Ocr'
      pdf-parser:
        $ref: '#/definitions/mp_yuanjing.PdfParser'
      rerank:
        $ref: '#/definitions/mp_yuanjing.Rerank'
    type: object
  mp.ProviderModelConfig:
    properties:
      providerDeepSeek:
        $ref: '#/definitions/mp.ProviderModelByDeepSeek'
      providerHuoShan:
        $ref: '#/definitions/mp.ProviderModelByHuoShan'
      providerInfini:
        $ref: '#/definitions/mp.ProviderModelByInfini'
      providerOllama:
        $ref: '#/definitions/mp.ProviderModelByOllama'
      providerOpenAICompatible:
        $ref: '#/definitions/mp.ProviderModelByOpenAICompatible'
      providerQianFan:
        $ref: '#/definitions/mp.ProviderModelByQianFan'
      providerQwen:
        $ref: '#/definitions/mp.ProviderModelByQwen'
      providerYuanJing:
        $ref: '#/definitions/mp.ProviderModelByYuanjing'
    type: object
  mp_common.EmbeddingData:
    properties:
      embedding: {}
      index:
        type: integer
      object:
        type: string
      type:
        type: string
    required:
    - embedding
    type: object
  mp_common.EmbeddingReq:
    properties:
      encoding_format:
        type: string
      input:
        items:
          type: string
        type: array
      model:
        type: string
      user:
        description: 用户标识（兼容千帆)
        type: string
    required:
    - input
    - model
    type: object
  mp_common.EmbeddingResp:
    properties:
      created:
        type: integer
      data:
        items:
          $ref: '#/definitions/mp_common.EmbeddingData'
        type: array
      id:
        type: string
      model:
        type: string
      object:
        type: string
      usage:
        $ref: '#/definitions/mp_common.Usage'
    required:
    - data
    - model
    type: object
  mp_common.ExtraBody:
    properties:
      api_option:
        description: 选择指定功能。 1）math：拍照答题；2）ocr：多模态OCR；3）general：通用场景。   默认会根据prompt进行意图判断
        type: string
    type: object
  mp_common.FunctionCall:
    properties:
      arguments:
        type: string
      name:
        type: string
    type: object
  mp_common.GuiContent:
    properties:
      action:
        type: string
      box:
        items:
          type: integer
        type: array
      description:
        type: string
      operation:
        type: string
      sensitivity:
        type: string
      value:
        type: string
    required:
    - action
    - description
    - operation
    type: object
  mp_common.GuiReq:
    properties:
      algo:
        description: 算法名称，默认gui_agent_v1
        type: string
      current_screenshot:
        description: 当前屏幕截图，Base64编码的图像字符串
        type: string
      current_screenshot_height:
        description: 当前屏幕截图的高度
        type: integer
      current_screenshot_width:
        description: 当前屏幕截图的宽度
        type: integer
      current_screenshot_xml:
        description: 屏幕布局导出的xml文件
        type: string
      history:
        description: 当前任务的历史返回结果，历次返回结果中的content字段
        items:
          type: string
        type: array
      platform:
        description: 平台信息，移动端填写Mobile, Windows端填写WIN，Mac端填写MAC
        type: string
      task:
        description: 当前用户任务
        type: string
    required:
    - current_screenshot
    - current_screenshot_height
    - current_screenshot_width
    - platform
    - task
    type: object
  mp_common.GuiResp:
    properties:
      code:
        type: integer
      content:
        $ref: '#/definitions/mp_common.GuiContent'
      message:
        type: string
      usage:
        $ref: '#/definitions/mp_common.Usage'
    required:
    - content
    - message
    - usage
    type: object
  mp_common.LLMParams:
    properties:
      frequencyPenalty:
        description: 频率惩罚
        type: number
      frequencyPenaltyEnable:
        description: 频率惩罚(开关)
        type: boolean
      maxTokens:
        description: 最大标记
        type: integer
      maxTokensEnable:
        description: 最大标记(开关)
        type: boolean
      presencePenalty:
        description: 存在惩罚
        type: number
      presencePenaltyEnable:
        description: 存在惩罚(开关)
        type: boolean
      temperature:
        description: 温度
        type: number
      temperatureEnable:
        description: 温度(开关)
        type: boolean
      topP:
        description: Top P
        type: number
      topPEnable:
        description: Top P(开关)
        type: boolean
    type: object
  mp_common.LLMReq:
    properties:
      do_sample:
        description: Yuanjing
        type: boolean
      enable_thinking:
        type: boolean
      extra_body:
        allOf:
        - $ref: '#/definitions/mp_common.ExtraBody'
        description: 扩展参数
      frequency_penalty:
        description: 频率惩罚系数
        type: number
      logit_bias:
        additionalProperties:
          type: integer
        description: 调整指定 token 在模型输出内容中出现的概率
        type: object
      logprobs:
        description: 是否返回输出 Token 的对数概率
        type: boolean
      max_completion_tokens:
        description: 控制模型输出的最大长度[0,64k]
        type: integer
      max_tokens:
        type: integer
      messages:
        items:
          $ref: '#/definitions/mp_common.OpenAIReqMsg'
        type: array
      min_p:
        type: number
      model:
        description: general
        type: string
      "n":
        type: integer
      parallel_tool_calls:
        description: 是否开启并行工具调用
        type: boolean
      presence_penalty:
        description: 控制模型生成文本时的内容重复度
        type: number
      repetition_penalty:
        description: 模型生成时连续序列中的重复度
        type: number
      response_format:
        $ref: '#/definitions/mp_common.OpenAIResponseFormat'
      seed:
        description: 种子
        type: integer
      stop:
        type: string
      stream:
        type: boolean
      stream_options:
        allOf:
        - $ref: '#/definitions/mp_common.StreamOptions'
        description: '当启用流式输出时，可通过将本参数设置为{"include_usage": true}，在输出的最后一行显示所使用的Token数。'
      temperature:
        type: number
      thinking:
        allOf:
        - $ref: '#/definitions/mp_common.Thinking'
        description: custom
      thinking_budget:
        description: 思考过程的最大长度，只在enable_thinking为true时生效
        type: integer
      tool_choice:
        description: 强制指定工具调用的策略
      tools:
        items:
          $ref: '#/definitions/mp_common.OpenAITool'
        type: array
      top_k:
        type: integer
      top_logprobs:
        description: 指定在每一步生成时，返回模型最大概率的候选 Token 个数
        type: integer
      top_p:
        type: number
      user:
        description: 用户标识（兼容千帆)
        type: string
      web_search:
        allOf:
        - $ref: '#/definitions/mp_common.WebSearch'
        description: 搜索增强
    required:
    - messages
    - model
    type: object
  mp_common.LLMResp:
    properties:
      choices:
        description: 生成结果列表
        items:
          $ref: '#/definitions/mp_common.OpenAIRespChoice'
        type: array
      code:
        type: integer
      created:
        description: 时间戳（秒）
        type: integer
      id:
        description: 唯一标识
        type: string
      img_id:
        description: 视觉模型返回图片id
        type: string
      model:
        description: 使用的模型
        type: string
      object:
        description: 固定为 "chat.completion"
        type: string
      service_tier:
        description: （火山）指定是否使用TPM保障包。生效对象为购买了保障包推理接入点
        type: string
      system_fingerprint:
        type: string
      usage:
        allOf:
        - $ref: '#/definitions/mp_common.OpenAIRespUsage'
        description: token 使用统计
    required:
    - choices
    - model
    type: object
  mp_common.MsgRole:
    enum:
    - system
    - user
    - assistant
    - tool
    type: string
    x-enum-varnames:
    - MsgRoleSystem
    - MsgRoleUser
    - MsgRoleAssistant
    - MsgRoleFunction
  mp_common.MultiDocument:
    properties:
      image:
        type: string
      text:
        type: string
    type: object
  mp_common.MultiInput:
    properties:
      audio:
        type: string
      image:
        type: string
      text:
        type: string
      video:
        type: string
    type: object
  mp_common.MultiModalEmbeddingReq:
    properties:
      dimensions:
        type: integer
      encoding_format:
        type: string
      input:
        items:
          $ref: '#/definitions/mp_common.MultiInput'
        type: array
      model:
        type: string
    required:
    - input
    - model
    type: object
  mp_common.MultiModalEmbeddingResp:
    properties:
      created:
        type: integer
      data:
        items:
          $ref: '#/definitions/mp_common.EmbeddingData'
        type: array
      id:
        type: string
      model:
        type: string
      object:
        type: string
      usage:
        $ref: '#/definitions/mp_common.Usage'
    required:
    - data
    - model
    type: object
  mp_common.MultiModalRerankReq:
    properties:
      documents:
        description: 需要重排序的内容列表
        items:
          $ref: '#/definitions/mp_common.MultiDocument'
        type: array
      instruction:
        description: 指令内容（适配元景qwen_rerank）
        type: string
      model:
        type: string
      query:
        description: 重排序的查询内容
      return_documents:
        description: 是否返回排序前的文档。默认为true
        type: boolean
      top_n:
        description: 返回排序后的top_n个文档。默认返回全部文档。
        type: integer
      user:
        description: 用户标识（兼容千帆)
        type: string
    required:
    - documents
    - model
    - query
    type: object
  mp_common.MultiModalRerankResp:
    properties:
      model:
        type: string
      object:
        type: string
      request_id:
        type: string
      results:
        items:
          $ref: '#/definitions/mp_common.Result'
        type: array
      usage:
        $ref: '#/definitions/mp_common.Usage'
    required:
    - results
    type: object
  mp_common.OcrData:
    properties:
      length:
        type: integer
      page_num:
        items:
          type: integer
        minItems: 1
        type: array
      text:
        type: string
      type:
        type: string
    required:
    - page_num
    - type
    type: object
  mp_common.OcrResp:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/mp_common.OcrData'
        type: array
      filename:
        type: string
      id:
        type: string
      message:
        type: string
      sha1:
        type: string
      time_cost:
        type: number
      timestamp:
        type: string
      version:
        type: string
    required:
    - data
    - message
    type: object
  mp_common.OpenAIFunction:
    properties:
      description:
        type: string
      name:
        type: string
      parameters: {}
    required:
    - name
    type: object
  mp_common.OpenAIMsg:
    properties:
      content:
        type: string
      function_call:
        $ref: '#/definitions/mp_common.FunctionCall'
      name:
        type: string
      reasoning_content:
        type: string
      role:
        allOf:
        - $ref: '#/definitions/mp_common.MsgRole'
        description: '"system" | "user" | "assistant" | "function(已弃用)"'
      tool_call_id:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/mp_common.ToolCall'
        type: array
    type: object
  mp_common.OpenAIReqMsg:
    properties:
      content: {}
      function_call:
        $ref: '#/definitions/mp_common.FunctionCall'
      name:
        type: string
      reasoning_content:
        type: string
      role:
        allOf:
        - $ref: '#/definitions/mp_common.MsgRole'
        description: '"system" | "user" | "assistant" | "function(已弃用)"'
      tool_call_id:
        type: string
      tool_calls:
        items:
          $ref: '#/definitions/mp_common.ToolCall'
        type: array
    type: object
  mp_common.OpenAIRespChoice:
    properties:
      delta:
        allOf:
        - $ref: '#/definitions/mp_common.OpenAIMsg'
        description: 流式生成的消息
      finish_reason:
        description: 停止原因
        type: string
      index:
        description: 选项索引
        type: integer
      logprobs: {}
      message:
        allOf:
        - $ref: '#/definitions/mp_common.OpenAIMsg'
        description: 非流式生成的消息
    type: object
  mp_common.OpenAIRespUsage:
    properties:
      completion_tokens:
        description: 输出 token 数
        type: integer
      prompt_tokens:
        description: 输入 token 数
        type: integer
      total_tokens:
        description: 总 token 数
        type: integer
    type: object
  mp_common.OpenAIResponseFormat:
    properties:
      type:
        description: '"text" | "json"'
        type: string
    type: object
  mp_common.OpenAITool:
    properties:
      function:
        $ref: '#/definitions/mp_common.OpenAIFunction'
      type:
        $ref: '#/definitions/mp_common.ToolType'
    required:
    - function
    - type
    type: object
  mp_common.PdfParserResp:
    properties:
      code:
        type: string
      content:
        type: string
      message:
        type: string
      prefix_image_url:
        type: string
      status:
        type: string
      trace_id:
        type: string
      version:
        type: string
    required:
    - code
    - content
    - message
    type: object
  mp_common.RerankResp:
    properties:
      model:
        type: string
      object:
        type: string
      request_id:
        type: string
      results:
        items:
          $ref: '#/definitions/mp_common.Result'
        type: array
      usage:
        $ref: '#/definitions/mp_common.Usage'
    required:
    - results
    type: object
  mp_common.Result:
    properties:
      document: {}
      index:
        type: integer
      relevance_score:
        type: number
    required:
    - relevance_score
    type: object
  mp_common.SegmentedContent:
    properties:
      end:
        type: string
      speaker:
        type: string
      start:
        type: string
      text:
        type: string
    type: object
  mp_common.StreamOptions:
    properties:
      chunk_include_usage:
        type: boolean
      include_usage:
        type: boolean
    type: object
  mp_common.SyncAsrAudio:
    properties:
      data:
        type: string
      fileName:
        type: string
    type: object
  mp_common.SyncAsrReq:
    properties:
      extra:
        additionalProperties: true
        type: object
      messages:
        items:
          $ref: '#/definitions/mp_common.SyncAsrReqMsg'
        type: array
      model:
        type: string
    required:
    - messages
    - model
    type: object
  mp_common.SyncAsrReqC:
    properties:
      audio:
        $ref: '#/definitions/mp_common.SyncAsrAudio'
      text:
        type: string
      type:
        type: string
    required:
    - type
    type: object
  mp_common.SyncAsrReqMsg:
    properties:
      content:
        items:
          $ref: '#/definitions/mp_common.SyncAsrReqC'
        type: array
      role:
        type: string
    required:
    - content
    - role
    type: object
  mp_common.SyncAsrReqMsgRespChoice:
    properties:
      finish_reason:
        type: string
      message:
        $ref: '#/definitions/mp_common.SyncAsrRespMsg'
    type: object
  mp_common.SyncAsrResp:
    properties:
      choices:
        items:
          $ref: '#/definitions/mp_common.SyncAsrReqMsgRespChoice'
        type: array
      code:
        type: integer
      seconds:
        type: integer
    type: object
  mp_common.SyncAsrRespMsg:
    properties:
      content:
        items:
          $ref: '#/definitions/mp_common.SyncAsrRespMsgC'
        type: array
      extra:
        additionalProperties: true
        type: object
      role:
        $ref: '#/definitions/mp_common.MsgRole'
    type: object
  mp_common.SyncAsrRespMsgC:
    properties:
      segmented_content:
        items:
          $ref: '#/definitions/mp_common.SegmentedContent'
        type: array
      text:
        type: string
    type: object
  mp_common.Tag:
    properties:
      text:
        type: string
    type: object
  mp_common.TextRerankReq:
    properties:
      documents:
        description: 需要重排序的文本
        items:
          type: string
        type: array
      instruction:
        description: 指令内容（适配元景qwen_rerank）
        type: string
      model:
        type: string
      query:
        type: string
      return_documents:
        type: boolean
      top_n:
        description: 返回排序后的top_n个文档。默认返回全部文档。
        type: integer
      user:
        description: 用户标识（兼容千帆)
        type: string
    required:
    - documents
    - model
    - query
    type: object
  mp_common.Thinking:
    properties:
      type:
        default: enabled
        type: string
    type: object
  mp_common.ToolCall:
    properties:
      function:
        $ref: '#/definitions/mp_common.FunctionCall'
      id:
        type: string
      index:
        type: integer
      type:
        $ref: '#/definitions/mp_common.ToolType'
    type: object
  mp_common.ToolType:
    enum:
    - function
    type: string
    x-enum-varnames:
    - ToolTypeFunction
  mp_common.Usage:
    properties:
      completion_tokens:
        type: integer
      prompt_tokens:
        type: integer
      total_tokens:
        type: integer
    type: object
  mp_common.WebSearch:
    properties:
      enable:
        type: boolean
      enable_citation:
        type: boolean
      enable_status:
        type: boolean
      enable_trace:
        type: boolean
    type: object
  mp_deepseek.LLM:
    properties:
      apiKey:
        description: ApiKey
