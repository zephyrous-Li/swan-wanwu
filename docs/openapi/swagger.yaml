        type: string
      "n":
        type: string
      use:
        type: string
    type: object
  request.AppKnowledgeBase:
    properties:
      category:
        description: 知识库类别 0-知识库，1-问答库，2-多模态知识库
        type: integer
      external:
        description: 外部数据库标识
        type: integer
      graphSwitch:
        description: 知识图谱开关
        type: integer
      id:
        description: 知识库id
        type: string
      metaDataFilterParams:
        $ref: '#/definitions/request.MetaDataFilterParams'
      name:
        type: string
      orgName:
        description: 知识库所属名称
        type: string
      share:
        description: 是分享，还是私有
        type: boolean
    required:
    - id
    type: object
  request.Avatar:
    properties:
      key:
        description: 前端透传给后端用于保存avatar，例如：custom-upload/avatar/abc/def.png
        type: string
      path:
        description: 前端请求地址，例如：/v1/static/avatar/abc/def.png (请求非必填)
        type: string
    type: object
  request.CreateKnowledgeReq:
    properties:
      category:
        description: 0:知识库，1:问答库,2:多模态知识库
        type: integer
      description:
        type: string
      embeddingModelInfo:
        $ref: '#/definitions/request.EmbeddingModel'
      knowledgeGraph:
        $ref: '#/definitions/request.KnowledgeGraph'
      name:
        type: string
    required:
    - embeddingModelInfo
    - name
    type: object
  request.DeleteDocReq:
    properties:
      docIdList:
        items:
          type: string
        type: array
      knowledgeId:
        type: string
    required:
    - docIdList
    - knowledgeId
    type: object
  request.DeleteKnowledge:
    properties:
      knowledgeId:
        type: string
    required:
    - knowledgeId
    type: object
  request.DeleteKnowledgeExportRecordReq:
    properties:
      exportRecordId:
        description: 问答库导出记录id
        type: string
      knowledgeId:
        description: 问答库id
        type: string
    required:
    - exportRecordId
    - knowledgeId
    type: object
  request.DocConfigUpdateReq:
    properties:
      asrModelId:
        description: asr模型id
        type: string
      docAnalyzer:
        description: 文档解析类型 text / ocr  / model / asr / multimodal
        items:
          type: string
        type: array
      docIdList:
        description: 文档id列表，当更新配置时需要传
        items:
          type: string
        type: array
      docImportType:
        description: 文档导入类型，0：文件上传，1：单条url上传，2.文件url上传
        type: integer
      docMetaData:
        description: 元数据
        items:
          $ref: '#/definitions/request.DocMetaData'
        type: array
      docPreprocess:
        description: 文本预处理规则 replaceSymbols / deleteLinks
        items:
          type: string
        type: array
      docSegment:
        allOf:
        - $ref: '#/definitions/request.DocSegment'
        description: 文档分段配置
      knowledgeId:
        description: 知识库id
        type: string
      multimodalModelId:
        description: 多模态模型id
        type: string
      parserModelId:
        description: 模型解析或ocr模型id
        type: string
    required:
    - docAnalyzer
    - docIdList
    - docSegment
    - knowledgeId
    type: object
  request.DocImportReq:
    properties:
      asrModelId:
        description: asr模型id
        type: string
      docAnalyzer:
        description: 文档解析类型 text / ocr  / model / asr / multimodal
        items:
          type: string
        type: array
      docImportType:
        description: 文档导入类型，0：文件上传，1：单条url上传，2.文件url上传
        type: integer
      docInfoList:
        description: 上传文档列表
        items:
          $ref: '#/definitions/request.DocInfo'
        type: array
      docMetaData:
        description: 元数据
        items:
          $ref: '#/definitions/request.DocMetaData'
        type: array
      docPreprocess:
        description: 文本预处理规则 replaceSymbols / deleteLinks
        items:
          type: string
        type: array
      docSegment:
        allOf:
        - $ref: '#/definitions/request.DocSegment'
        description: 文档分段配置
      knowledgeId:
        description: 知识库id
        type: string
      multimodalModelId:
        description: 多模态模型id
        type: string
      parserModelId:
        description: 模型解析或ocr模型id
        type: string
    required:
    - docAnalyzer
    - docInfoList
    - docSegment
    - knowledgeId
    type: object
  request.DocInfo:
    properties:
      docId:
        description: 文档id
        type: string
      docName:
        description: 文档名称
        type: string
      docSize:
        description: 文档大小，单位字节(Byte)
        type: integer
      docType:
        description: 文档后缀
        type: string
      docUrl:
        description: 文档url（可选）
        type: string
    type: object
  request.DocListReq:
    properties:
      docIdList:
        description: 文档id列表，只用于返回所选文档的集合，该值不为空时，其他筛选条件将被忽略
        items:
          type: string
        type: array
      docName:
        type: string
      graphStatus:
        description: 图谱状态：-1.全部 0.待处理 1.解析中 2.解析成功 3.解析失败
        items:
          type: integer
        type: array
      knowledgeId:
        type: string
      metaValue:
        type: string
      pageNo:
        type: integer
      pageSize:
        type: integer
      status:
        description: 文档状态：-1-全部， 0-待处理， 1- 处理完成， 2-正在审核中，3-正在解析中，4-审核未通过，5-解析失败
        items:
          type: integer
        type: array
    required:
    - knowledgeId
    - pageSize
    type: object
  request.DocMetaData:
    properties:
      metaId:
        description: 元数据id
        type: string
      metaKey:
        description: key
        type: string
      metaRule:
        description: 正则表达式
        type: string
      metaValue:
        description: 确定值
        type: string
      metaValueType:
        description: string，number，time
        type: string
      option:
        description: option:add(新增)、update(更新)、delete(删除),update 和delete 的时候metaId
          不能为空
        type: string
    type: object
  request.DocSegment:
    properties:
      maxSplitter:
        description: 可分隔最大值（只有自定义分段必填）
        type: integer
      overlap:
        description: 可重叠值（只有自定义分段必填）
        type: number
      segmentMethod:
        description: 分段方法 0：通用分段；1：父子分段
        type: string
      segmentType:
        description: 分段方式，只有通用分段必填 0：自动分段；1：自定义分段
        type: string
      splitter:
        description: 分隔符（只有自定义分段必填）
        items:
          type: string
        type: array
      subMaxSplitter:
        description: 可分隔最大值（只有父子分段必填）
        type: integer
      subSplitter:
        description: 分隔符（只有父子分段必填）
        items:
          type: string
        type: array
    required:
    - segmentMethod
    type: object
  request.EmbeddingModel:
    properties:
      modelId:
        type: string
    required:
    - modelId
    type: object
  request.History:
    properties:
      needHistory:
        type: boolean
      query:
        type: string
      response:
        type: string
    type: object
  request.KnowledgeDocExportReq:
    properties:
      docIdList:
        description: 文档id
        items:
          type: string
        type: array
      knowledgeId:
        description: 知识库id
        type: string
    required:
    - knowledgeId
    type: object
  request.KnowledgeGraph:
    properties:
      llmModelId:
        description: 大模型id，开关为true必填
        type: string
      schemaUrl:
        description: 模型schema文件地址，可以为空
        type: string
      switch:
        description: 知识图谱开关
        type: boolean
    type: object
  request.KnowledgeHitReq:
    properties:
      docInfoList:
        description: 上传文档列表
        items:
          $ref: '#/definitions/request.DocInfo'
        type: array
      knowledgeList:
        items:
          $ref: '#/definitions/request.AppKnowledgeBase'
        type: array
      knowledgeMatchParams:
        $ref: '#/definitions/request.KnowledgeMatchParams'
      question:
        type: string
    required:
    - knowledgeMatchParams
    type: object
  request.KnowledgeMatchParams:
    properties:
      keywordPriority:
        description: 关键词权重
        type: number
      matchType:
        description: matchType：vector（向量检索）、text（文本检索）、mix（混合检索：向量+文本）
        type: string
      priorityMatch:
        description: 权重匹配，只有在混合检索模式下，选择权重设置后，这个才设置为1
        type: integer
      rerankModelId:
        description: rerank模型id
        type: string
      semanticsPriority:
        description: 语义权重
        type: number
      termWeight:
        description: 关键词系数
        type: number
      termWeightEnable:
        description: 关键词系数开关
        type: boolean
      threshold:
        description: threshold 过滤分数阈值
        type: number
      topK:
        description: topK 获取最高的几行
        type: integer
      useGraph:
        description: 是否使用知识图谱
        type: boolean
    required:
    - matchType
    type: object
  request.KnowledgeSelectReq:
    properties:
      category:
        description: 0:知识库，1:问答库
        type: integer
      external:
        description: -1:全部，0:内部知识库，1:外部知识库
        type: integer
      name:
        type: string
      tagId:
        items:
          type: string
        type: array
    type: object
  request.MetaDataFilterParams:
    properties:
      filterEnable:
        description: 元数据过滤开关
        type: boolean
      filterLogicType:
        description: 元数据逻辑条件：and/or
        type: string
      metaFilterParams:
        description: 元数据过滤参数列表
        items:
          $ref: '#/definitions/request.MetaFilterParams'
        type: array
    type: object
  request.MetaFilterParams:
    properties:
      condition:
        description: 条件
        type: string
      key:
        description: Key
        type: string
      type:
        description: 类型（Time, String, Number）
        type: string
      value:
        description: value
        type: string
    type: object
  request.OAuthRefreshRequest:
    properties:
      client_id:
        type: string
      client_secret:
        type: string
      grant_type:
        type: string
      refresh_token:
        type: string
    required:
    - grant_type
    type: object
  request.OpenAPIAgentChatRequest:
    properties:
      conversation_id:
        type: string
      query:
        type: string
      stream:
        type: boolean
      uuid:
        type: string
    required:
    - conversation_id
    - query
    - uuid
    type: object
